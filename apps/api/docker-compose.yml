services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: livearound-postgres
    environment:
      POSTGRES_USER: livearound
      POSTGRES_PASSWORD: livearound
      POSTGRES_DB: livearound
    ports:
      - "5432:5432"
    volumes:
      - livearound-postgres:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livearound -d livearound"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  livearound-postgres:
